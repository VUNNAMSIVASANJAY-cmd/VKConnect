name: vkconnect
description: VKConnect Chat App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 FIREBASE (COMPATIBLE SET)
  firebase_core: ^3.15.2
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.2.10
  shared_preferences: ^2.2.2


  # CONTACTS
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

